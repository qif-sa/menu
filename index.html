<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منيو قَيف</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f4d4ac;
            color: #8c542c;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f4d4ac;
        }
        ::-webkit-scrollbar-thumb {
            background: #8c542c;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6a4121;
        }
    </style>

    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const beverages = [
          { name: "المشروبات الحارة", image: "33.jpeg" },
          { name: "المشروبات الباردة", image: "44.jpeg" },
          { name: "القهوة المقطرة", image: "55.jpeg" },
        ];

        const sweets = [
          { name: "سكوب كوكيز", image: "35.jpg" },
          { name: "لير حامض حلو", image: "2.jpg" },
          { name: "كيكة تشوكلت", image: "3.jpg" },
          { name: "كيكة تمر", image: "5.jpg" },
          { name: "بيكان تشيز", image: "6.jpg" },
          { name: "توت كنافة", image: "7.jpg" },
          { name: "مكس قيف", image: "8.jpg" },
          { name: "هني سينابون", image: "9.jpg" },
          { name: "تشوكلت بستاشيو", image: "10.jpg" },
          { name: "تشوكلت سامولينا", image: "11.jpg" },
        ];

        const AnimateOnLoad = ({ children, delay = 0, duration = 500, animation = 'fade-in-up' }) => {
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => setIsVisible(true), delay);
                return () => clearTimeout(timer);
            }, [delay]);

            const animationClasses = {
                'fade-in-up': 'opacity-0 translate-y-8',
                'fade-in': 'opacity-0',
                'scale-in': 'opacity-0 scale-90'
            };

            const visibleClasses = {
                'fade-in-up': 'opacity-100 translate-y-0',
                'fade-in': 'opacity-100',
                'scale-in': 'opacity-100 scale-100'
            };

            return (
                <div
                    className={`transform transition-all ${isVisible ? visibleClasses[animation] : animationClasses[animation]}`}
                    style={{ transitionDuration: `${duration}ms` }}
                >
                    {children}
                </div>
            );
        };

        const ImageModal = ({ imageUrl, onClose }) => {
            if (!imageUrl) return null;

            return (
                <div
                    className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50"
                    onClick={onClose}
                >
                    <div
                        className="relative transform scale-95 opacity-0 animate-fade-in-scale"
                        onClick={(e) => e.stopPropagation()}
                    >
                        <style>{`
                            @keyframes fade-in-scale {
                                to { opacity: 1; transform: scale(1); }
                            }
                            .animate-fade-in-scale {
                                animation: fade-in-scale 300ms forwards;
                            }
                        `}</style>
                        <img
                            src={imageUrl}
                            alt="عرض مكبر"
                            className="max-w-[90vw] max-h-[85vh] object-contain rounded-lg shadow-2xl"
                        />
                        <button
                            onClick={onClose}
                            className="absolute top-2 right-2 text-white bg-[#8c542c] rounded-full w-10 h-10 flex items-center justify-center text-2xl font-bold hover:bg-[#6a4121]"
                        >
                            &times;
                        </button>
                    </div>
                </div>
            );
        };

        const MenuItem = ({ name, image, index, onImageClick }) => {
            return (
                <AnimateOnLoad delay={100 + index * 100} animation="scale-in">
                    <div
                        className="group overflow-hidden rounded-2xl shadow-lg bg-[#f9e7cf] hover:shadow-2xl hover:-translate-y-2 cursor-pointer border-4 border-[#8c542c]"
                        onClick={() => onImageClick(image)}
                    >
                        <img
                            src={image}
                            alt={name}
                            className="w-full h-56 md:h-72 object-cover group-hover:scale-110 transition-transform duration-500"
                        />
                        <div className="px-2 py-3 text-center">
                            <h3 className="text-sm sm:text-base font-bold text-[#8c542c]">
                                {name}
                            </h3>
                        </div>
                    </div>
                </AnimateOnLoad>
            );
        };

        const MenuSection = ({ title, items, onImageClick }) => (
            <section className="container mx-auto px-4 py-12">
                <AnimateOnLoad delay={100}>
                    <h2 className="text-4xl font-extrabold text-center mb-10 text-[#8c542c]">
                        {title}
                    </h2>
                </AnimateOnLoad>
                <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
                    {items.map((item, index) => (
                        <MenuItem
                            key={item.name}
                            {...item}
                            index={index}
                            onImageClick={onImageClick}
                        />
                    ))}
                </div>
            </section>
        );

        const CategoryToggle = ({ activeCategory, setActiveCategory }) => (
            <div className="flex justify-center my-8">
                <div className="flex border-2 border-[#8c542c] p-1 rounded-full">
                    <button
                        onClick={() => setActiveCategory('beverages')}
                        className={`px-6 py-2 rounded-full font-bold ${
                            activeCategory === 'beverages'
                                ? 'bg-[#8c542c] text-white'
                                : 'text-[#8c542c]'
                        }`}
                    >
                        المشروبات
                    </button>
                    <button
                        onClick={() => setActiveCategory('sweets')}
                        className={`px-6 py-2 rounded-full font-bold ${
                            activeCategory === 'sweets'
                                ? 'bg-[#8c542c] text-white'
                                : 'text-[#8c542c]'
                        }`}
                    >
                        أصناف الحلا
                    </button>
                </div>
            </div>
        );

        const App = () => {
            const [modalImage, setModalImage] = useState(null);
            const [activeCategory, setActiveCategory] = useState('beverages');

            return (
                <div className="min-h-screen">
                    <header className="text-center pt-8">
                        <img src="1.png" className="w-40 mx-auto" />
                    </header>

                    <CategoryToggle
                        activeCategory={activeCategory}
                        setActiveCategory={setActiveCategory}
                    />

                    {activeCategory === 'beverages' && (
                        <MenuSection title="المشروبات" items={beverages} onImageClick={setModalImage} />
                    )}

                    {activeCategory === 'sweets' && (
                        <MenuSection title="أصناف الحلا" items={sweets} onImageClick={setModalImage} />
                    )}

                    <footer className="py-8 text-center">
                        جميع الحقوق محفوظة لـ قَيف 2026 ©
                    </footer>

                    <ImageModal imageUrl={modalImage} onClose={() => setModalImage(null)} />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <script type="module" src="/index.tsx"></script>
</body>
</html>
